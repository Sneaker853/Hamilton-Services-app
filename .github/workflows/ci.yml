name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_db
      APP_ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: portfolio_web/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend API tests
        working-directory: portfolio_web/backend
        run: pytest -q --cov=routers --cov=portfolio_helpers --cov-report=term-missing --cov-report=xml --cov-fail-under=58 --junitxml=pytest-results.xml

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            portfolio_web/backend/coverage.xml
            portfolio_web/backend/pytest-results.xml

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: portfolio_web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: portfolio_web/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: portfolio_web/frontend
        run: npm test -- --watchAll=false --ci 2>&1 | tee frontend-test-output.txt

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: portfolio_web/frontend/frontend-test-output.txt
