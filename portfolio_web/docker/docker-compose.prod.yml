version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: portfolio_web/docker/Dockerfile.backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
    depends_on:
      - postgres
    networks:
      - portfolio-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: /api
    depends_on:
      - backend
    networks:
      - portfolio-network
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio-network
    restart: unless-stopped

  pg-backup:
    image: postgres:15-alpine
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - pg_backups:/backups
    depends_on:
      - postgres
    networks:
      - portfolio-network
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Starting daily backup scheduler..."
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="/backups/$${PGDATABASE}_$${TIMESTAMP}.sql.gz"
          echo "[$$(date)] Starting backup -> $${BACKUP_FILE}"
          pg_dump -Fc | gzip > "$${BACKUP_FILE}"
          if [ $$? -eq 0 ]; then
            echo "[$$(date)] Backup complete: $${BACKUP_FILE}"
          else
            echo "[$$(date)] Backup FAILED"
          fi
          # Retain last 7 daily backups
          ls -t /backups/*.sql.gz 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null
          sleep 86400
        done

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  pg_backups:

networks:
  portfolio-network:
    driver: bridge
