version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  market-data-db:
    image: postgres:15-alpine
    container_name: market-data-db
    environment:
      POSTGRES_USER: ${MARKET_DATA_DB_USER}
      POSTGRES_PASSWORD: ${MARKET_DATA_DB_PASSWORD}
      POSTGRES_DB: ${MARKET_DATA_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - market_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  backend:
    build:
      context: ../..
      dockerfile: portfolio_web/docker/Dockerfile.backend
    container_name: portfolio-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: ${APP_ENV:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    depends_on:
      - postgres
      - market-data-db
    networks:
      - portfolio-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: portfolio-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - portfolio-network
    restart: unless-stopped

volumes:
  postgres_data:
  market_data:

networks:
  portfolio-network:
    driver: bridge
